---
- name: Download K3s installer script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/install-k3s.sh
    mode: "0755"
  become: true

- name: Install K3s
  shell: /tmp/install-k3s.sh
  args:
    creates: /usr/local/bin/k3s
  become: true

- name: Enable and start K3s
  systemd:
    name: k3s
    state: started
    enabled: true
  become: true

- name: Ensure .kube directory exists
  file:
    path: /root/.kube
    state: directory
    mode: "0700"
  become: true

- name: Copy K3s kubeconfig to default location
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  become: true

- name: Make K3s kubeconfig world-readable
  file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: "0644"
  become: true

- name: Ensure kubectl is available via symlink
  file:
    src: /usr/local/bin/kubectl
    dest: /usr/bin/kubectl
    state: link
    force: true
  become: true

- name: Ensure pip3 is installed
  apt:
    name: python3-pip
    state: present
  become: true

- name: Install Kubernetes Python bindings (via apt)
  apt:
    name: python3-kubernetes
    state: present
  become: true

- name: Ensure AWS CLI is installed
  apt:
    name: awscli
    state: present
  become: true

- name: Fetch EC2 public IP from instance metadata (IMDSv2)
  shell: |
    TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
      -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
    curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
      http://169.254.169.254/latest/meta-data/public-ipv4
  register: ec2_public_ip
  become: true

- name: Push patched kubeconfig to Secrets Manager
  shell: |
    KUBECONFIG_CONTENT=$(sed 's/127\.0\.0\.1/{{ ec2_public_ip.stdout }}/g' /etc/rancher/k3s/k3s.yaml)
    aws secretsmanager describe-secret --secret-id qrgenix/kubeconfig 2>/dev/null \
      && aws secretsmanager put-secret-value \
           --secret-id qrgenix/kubeconfig \
           --secret-string "$KUBECONFIG_CONTENT" \
      || aws secretsmanager create-secret \
           --name qrgenix/kubeconfig \
           --secret-string "$KUBECONFIG_CONTENT"
  become: true
