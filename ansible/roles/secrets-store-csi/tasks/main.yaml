---
# Installs the AWS Secrets Store CSI Driver provider for AWS on the K3s cluster.
# The AWS provider chart bundles the core CSI driver as a dependency, so a single
# Helm release is sufficient. syncSecret.enabled=true allows secrets to be synced
# into native K8s Secret objects for use as env vars in pods.

- name: Add Secrets Store CSI Driver Helm repo
  command: helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
  args:
    creates: /root/.cache/helm/repository/secrets-store-csi-driver-index.yaml

- name: Add AWS Secrets Manager provider Helm repo
  command: helm repo add aws-secrets-manager https://aws.github.io/secrets-store-csi-driver-provider-aws
  args:
    creates: /root/.cache/helm/repository/aws-secrets-manager-index.yaml

- name: Update Helm repos
  command: helm repo update

- name: Install AWS Secrets Manager provider (includes CSI driver as dependency)
  command: >
    helm upgrade --install secrets-provider-aws aws-secrets-manager/secrets-store-csi-driver-provider-aws
    --namespace kube-system
    --set secrets-store-csi-driver.syncSecret.enabled=true
    --set awsRegion=us-east-2
  become: true
