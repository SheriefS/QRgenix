---
# Installs the Secrets Store CSI Driver and the AWS provider on the K3s cluster.
# This enables pods to mount secrets from AWS Secrets Manager directly as volumes.

- name: Add Secrets Store CSI Driver Helm repo
  command: helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
  args:
    creates: /root/.cache/helm/repository/secrets-store-csi-driver-index.yaml

- name: Add AWS Secrets Manager provider Helm repo
  command: helm repo add aws-secrets-manager https://aws.github.io/secrets-store-csi-driver-provider-aws
  args:
    creates: /root/.cache/helm/repository/aws-secrets-manager-index.yaml

- name: Update Helm repos
  command: helm repo update

- name: Install Secrets Store CSI Driver
  command: >
    helm upgrade --install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver
    --namespace kube-system
    --set syncSecret.enabled=true
  become: true

- name: Install AWS Secrets Manager provider
  command: >
    helm upgrade --install secrets-provider-aws aws-secrets-manager/secrets-store-csi-driver-provider-aws
    --namespace kube-system
    --set serviceAccount.create=false
  become: true
