# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qrgenix-backend
  namespace: qrgenix
  labels:
    app.kubernetes.io/managed-by: qrgenix
    app: qrgenix-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qrgenix-backend
  template:
    metadata:
      labels:
        app: qrgenix-backend
    spec:
      volumes:
        - name: postgres-credentials
          emptyDir: {}
      initContainers:
        - name: fetch-secrets
          image: amazon/aws-cli
          command: ["sh", "-c"]
          args:
            - |
              aws secretsmanager get-secret-value \
                --secret-id qrgenix/postgres \
                --region us-east-2 \
                --query SecretString \
                --output text | python3 -c "
              import sys, json
              d = json.load(sys.stdin)
              for k, v in d.items():
                  open('/etc/secrets/' + k, 'w').write(v)
              "
          volumeMounts:
            - name: postgres-credentials
              mountPath: /etc/secrets
      containers:
        - name: backend
          image: ghcr.io/sheriefs/qrgenix-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: qrgenix.settings
            - name: DB_HOST
              value: qrgenix-postgres
            - name: DB_PORT
              value: "5432"
            - name: AWS_STORAGE_BUCKET_NAME
              value: "qrgenix-logo-media"
            - name: AWS_S3_REGION_NAME
              value: "us-east-2"
          volumeMounts:
            - name: postgres-credentials
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      imagePullSecrets:
        - name: ghcr-secret
