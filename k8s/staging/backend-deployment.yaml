# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qrgenix-backend
  namespace: qrgenix
  labels:
    app.kubernetes.io/managed-by: qrgenix
    app: qrgenix-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qrgenix-backend
  template:
    metadata:
      labels:
        app: qrgenix-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/sheriefs/qrgenix-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: qrgenix.settings
            - name: DB_HOST
              value: qrgenix-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: qrgenix-postgres
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: qrgenix-postgres
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qrgenix-postgres
                  key: password
            - name: AWS_STORAGE_BUCKET_NAME
              value: "qrgenix-logo-media"
            - name: AWS_S3_REGION_NAME
              value: "us-east-2"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      imagePullSecrets:
        - name: ghcr-secret
