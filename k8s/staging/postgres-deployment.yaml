# PostgreSQL Deployment
# Credentials fetched from AWS Secrets Manager via init container using EC2 instance profile.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qrgenix-postgres
  namespace: qrgenix
  labels:
    app.kubernetes.io/managed-by: qrgenix
    app: qrgenix-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qrgenix-postgres
  template:
    metadata:
      labels:
        app: qrgenix-postgres
    spec:
      volumes:
        - name: postgres-credentials
          emptyDir: {}
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
      initContainers:
        - name: fetch-secrets
          image: amazon/aws-cli
          command: ["sh", "-c"]
          args:
            - |
              aws secretsmanager get-secret-value \
                --secret-id qrgenix/postgres \
                --region us-east-2 \
                --query SecretString \
                --output text | python3 -c "
              import sys, json
              d = json.load(sys.stdin)
              for k, v in d.items():
                  open('/etc/secrets/' + k, 'w').write(v)
              "
          volumeMounts:
            - name: postgres-credentials
              mountPath: /etc/secrets
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          command: ["/bin/bash", "-c"]
          args:
            - |
              export POSTGRES_USER=$(cat /etc/secrets/username)
              export POSTGRES_PASSWORD=$(cat /etc/secrets/password)
              export POSTGRES_DB=$(cat /etc/secrets/dbname)
              exec docker-entrypoint.sh postgres
          volumeMounts:
            - name: postgres-credentials
              mountPath: /etc/secrets
              readOnly: true
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
