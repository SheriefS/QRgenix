# SecretProviderClass — fetches qrgenix/postgres from AWS Secrets Manager
# and syncs the JSON fields into a native K8s Secret named qrgenix-postgres.
# The secret in Secrets Manager must be a JSON object with keys:
#   username, password, dbname
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: qrgenix-postgres
  namespace: qrgenix
  labels:
    app.kubernetes.io/managed-by: qrgenix
spec:
  provider: aws
  parameters:
    region: us-east-2
    objects: |
      - objectName: "qrgenix/postgres"
        objectType: "secretsmanager"
        jmesPath:
          - path: username
            objectAlias: username
          - path: password
            objectAlias: password
          - path: dbname
            objectAlias: dbname
  secretObjects:
    - secretName: qrgenix-postgres
      type: Opaque
      data:
        - objectName: username
          key: username
        - objectName: password
          key: password
        - objectName: dbname
          key: dbname
